<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TapTheBock – Coming Soon</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background-color: #34495e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: #ffffff;
      padding: 2rem;
    }

    .logo {
      width: 160px;
      height: 160px;
      border-radius: 36px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
      margin-bottom: 2rem;
    }

    .game-title {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 0.5rem;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
    }

    .tagline {
      font-size: 1.1rem;
      opacity: 0.8;
      margin-bottom: 2.5rem;
      text-align: center;
      max-width: 320px;
      line-height: 1.5;
    }

    .store-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      align-items: center;
    }

    .store-btn {
      display: inline-block;
      text-decoration: none;
      transition: transform 0.15s, filter 0.2s;
      border-radius: 8px;
    }

    .store-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.08);
    }

    .store-btn:active {
      transform: translateY(0);
    }

    .store-btn svg {
      display: block;
      height: 54px;
      width: auto;
    }

    @media (max-width: 420px) {
      .store-buttons {
        flex-direction: column;
        width: 100%;
        max-width: 260px;
      }

      .store-btn,
      .store-btn svg {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <img src="logo.png" alt="TapTheBock logo" class="logo" />

  <h1 class="game-title">TapTheBock</h1>
  <p class="tagline">Join the waitlist — the game is coming soon to iOS and Android.</p>

  <div class="store-buttons">
    <a href="https://apps.apple.com" class="store-btn" target="_blank" rel="noopener noreferrer" aria-label="Download on the App Store">
      <!-- Official App Store badge -->
      <svg viewBox="0 0 120 40" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Download on the App Store" preserveAspectRatio="xMidYMid meet">
        <rect width="120" height="40" rx="6.5" fill="#000000"/>
        <rect x="0.5" y="0.5" width="119" height="39" rx="6" fill="none" stroke="#A6A6A6" stroke-width="1"/>
        <path fill="#ffffff" d="M27.05 19.78c-.02-1.66.74-2.92 2.29-3.84-.86-1.24-2.17-1.92-3.89-2.06-1.63-.13-3.42 .95-4.07 .95-.69 0-2.27-.9-3.51-.9-2.57 .04-5.31 2.05-5.31 6.13 0 1.21 .22 2.45 .66 3.74 .59 1.69 2.73 5.84 4.96 5.77 1.16-.03 1.98-.83 3.49-.83 1.47 0 2.23 .83 3.52 .83 2.25-.03 4.18-3.8 4.75-5.5-3.02-1.42-2.84-4.16-2.84-4.26zM24.4 12.26c1.28-1.52 1.16-2.9 1.12-3.4-1.13 .07-2.43 .77-3.18 1.64-.82 .93-1.3 2.08-1.2 3.36 1.22 .09 2.34-.54 3.26-1.6z"/>
        <text x="36" y="15.5" fill="#ffffff" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="6">Download on the</text>
        <text x="35.5" y="30" fill="#ffffff" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="15" font-weight="600">App Store</text>
      </svg>
    </a>

    <a href="https://play.google.com/store" class="store-btn" target="_blank" rel="noopener noreferrer" aria-label="Get it on Google Play">
      <!-- Official Google Play badge -->
      <svg viewBox="0 0 135 40" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Get it on Google Play" preserveAspectRatio="xMidYMid meet">
        <rect width="135" height="40" rx="6.5" fill="#000000"/>
        <rect x="0.5" y="0.5" width="134" height="39" rx="6" fill="none" stroke="#A6A6A6" stroke-width="1"/>
        <g transform="translate(9.2,9.2) scale(0.9)">
          <path fill="#FFCE00" d="M22.018 13.298l-3.919 2.218-3.515-3.493 3.543-3.521 3.891 2.202a1.49 1.49 0 0 1 0 2.594z"/>
          <path fill="#00C3FF" d="M1.337.924a1.487 1.487 0 0 0-.112.568v20.004c0 .198.04.388.104.558l11.03-10.985L1.337.924z"/>
          <path fill="#00E676" d="M13.245 11.062l2.892-2.876L3.352.219a1.49 1.49 0 0 0-1.523.049l11.416 10.794z"/>
          <path fill="#FF3D47" d="M13.245 13.129L2.02 23.748a1.487 1.487 0 0 0 1.519.044l12.722-7.204-3.016-3.459z"/>
        </g>
        <text x="36" y="15.5" fill="#ffffff" font-family="Roboto, Arial, sans-serif" font-size="5.5" letter-spacing="0.6">GET IT ON</text>
        <text x="35.5" y="30" fill="#ffffff" font-family="Roboto, Arial, sans-serif" font-size="15" font-weight="500">Google Play</text>
      </svg>
    </a>
  </div>

</body>
</html>
