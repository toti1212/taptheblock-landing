<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TapTheBock – Coming Soon</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background-color: #34495e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: #ffffff;
      padding: 2rem;
    }

    .logo {
      width: 160px;
      height: 160px;
      border-radius: 36px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
      margin-bottom: 2rem;
    }

    .game-title {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 0.5rem;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
    }

    .tagline {
      font-size: 1.1rem;
      opacity: 0.8;
      margin-bottom: 2.5rem;
      text-align: center;
      max-width: 320px;
      line-height: 1.5;
    }

    .store-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      justify-content: center;
      align-items: center;
    }

    .store-btn {
      display: inline-block;
      text-decoration: none;
      transition: transform 0.15s, filter 0.2s;
    }

    .store-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.08);
    }

    .store-btn:active {
      transform: translateY(0);
    }

    .store-btn img {
      display: block;
      width: auto;
    }

    /* Apple badge has no built-in padding; Google's PNG includes ~25% clear
       space, so it's rendered taller to make the visible badges match. */
    .appstore-badge {
      height: 46px;
    }

    .googleplay-badge {
      height: 69px;
    }

    @media (max-width: 420px) {
      .store-buttons {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <img src="logo.png" alt="TapTheBock logo" class="logo" />

  <h1 class="game-title">TapTheBock</h1>
  <p class="tagline">Join the waitlist — the game is coming soon to iOS and Android.</p>

  <div class="store-buttons">
    <a href="https://apps.apple.com" class="store-btn" target="_blank" rel="noopener noreferrer">
      <img src="appstore-badge.svg" alt="Download on the App Store" class="appstore-badge" />
    </a>

    <a href="https://play.google.com/store" class="store-btn" target="_blank" rel="noopener noreferrer">
      <img src="googleplay-badge.png" alt="Get it on Google Play" class="googleplay-badge" />
    </a>
  </div>

</body>
</html>
