<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TapTheBock – Coming Soon</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background-color: #34495e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: #ffffff;
      padding: 2rem;
    }

    .logo {
      width: 160px;
      height: 160px;
      border-radius: 36px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
      margin-bottom: 2rem;
    }

    .game-title {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 0.5rem;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
    }

    .tagline {
      font-size: 1.1rem;
      opacity: 0.8;
      margin-bottom: 2.5rem;
      text-align: center;
      max-width: 320px;
      line-height: 1.5;
    }

    .store-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
    }

    .store-btn {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      background: rgba(255, 255, 255, 0.12);
      border: 1.5px solid rgba(255, 255, 255, 0.3);
      color: #ffffff;
      text-decoration: none;
      padding: 0.8rem 1.4rem;
      border-radius: 14px;
      font-size: 0.85rem;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: background 0.2s, transform 0.15s;
      min-width: 175px;
    }

    .store-btn:hover {
      background: rgba(255, 255, 255, 0.22);
      transform: translateY(-2px);
    }

    .store-btn:active {
      transform: translateY(0);
    }

    .store-btn .btn-label {
      display: flex;
      flex-direction: column;
    }

    .store-btn .btn-sublabel {
      font-size: 0.68rem;
      opacity: 0.75;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .store-btn .btn-name {
      font-size: 1rem;
      font-weight: 700;
    }

    .store-btn svg {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
    }
  </style>
</head>
<body>

  <img src="logo.png" alt="TapTheBock logo" class="logo" />

  <h1 class="game-title">TapTheBock</h1>
  <p class="tagline">Join the waitlist — the game is coming soon to iOS and Android.</p>

  <div class="store-buttons">
    <a href="https://apps.apple.com" class="store-btn" target="_blank" rel="noopener noreferrer">
      <!-- Apple logo -->
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
      </svg>
      <span class="btn-label">
        <span class="btn-sublabel">Download on the</span>
        <span class="btn-name">App Store</span>
      </span>
    </a>

    <a href="https://play.google.com/store" class="store-btn" target="_blank" rel="noopener noreferrer">
      <!-- Google Play logo -->
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M22.018 13.298l-3.919 2.218-3.515-3.493 3.543-3.521 3.891 2.202a1.49 1.49 0 0 1 0 2.594zM1.337.924a1.487 1.487 0 0 0-.112.568v20.004c0 .198.04.388.104.558l11.03-10.985L1.337.924zm11.908 10.138l2.892-2.876L3.352.219a1.49 1.49 0 0 0-1.523.049l11.416 10.794zm0 2.067L2.02 23.748a1.487 1.487 0 0 0 1.519.044l12.722-7.204-3.016-3.459z"/>
      </svg>
      <span class="btn-label">
        <span class="btn-sublabel">Get it on</span>
        <span class="btn-name">Google Play</span>
      </span>
    </a>
  </div>

</body>
</html>
